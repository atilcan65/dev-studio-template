name: User Story
description: Yeni özellik veya kullanıcı ihtiyacı için story
title: "[Story] "
labels: ["type:feature", "status:backlog"]
body:
  - type: markdown
    attributes:
      value: |
        ## User Story
        "As a [user], I want [feature] so that [benefit]" formatında yaz.

  - type: textarea
    id: story
    attributes:
      label: User Story
      placeholder: "As a developer, I want auto-deployment so that I can release faster"
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Bu story ne zaman "Done" sayılacak?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 — Critical
        - P1 — High
        - P2 — Medium
        - P3 — Low
      default: 2
    validations:
      required: true

  - type: input
    id: story_points
    attributes:
      label: Story Points (Fibonacci)
      description: "1, 2, 3, 5, 8, 13, 21"
      placeholder: "3"

  - type: dropdown
    id: agent
    attributes:
      label: Suggested Agent
      options:
        - orchestrator
        - pm
        - architect
        - developer
        - tester
      default: 3

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      placeholder: Teknik bağlam, kısıtlamalar, ilgili PR'lar...
